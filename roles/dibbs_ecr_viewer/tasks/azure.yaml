---
# Azure Configuration Tasks

- name: Read existing AZURE_STORAGE_CONNECTION_STRING from .env file
  ansible.builtin.shell: |
    source "{{ dibbs_ecr_viewer_env_file }}" 2>/dev/null || true
    echo "AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-}"
  register: dibbs_ecr_viewer_existing_azure_storage_connection_string
  failed_when: false
  changed_when: false

- name: Prompt for AZURE_STORAGE_CONNECTION_STRING
  ansible.builtin.pause:
    prompt: |
      AZURE_STORAGE_CONNECTION_STRING (Current: {{ dibbs_ecr_viewer_existing_azure_storage_connection_string.stdout | default('') }}):
  register: dibbs_ecr_viewer_azure_storage_connection_string_input

- name: Set AZURE_STORAGE_CONNECTION_STRING fact
  ansible.builtin.set_fact:
    dibbs_ecr_viewer_azure_storage_connection_string: "{{ dibbs_ecr_viewer_azure_storage_connection_string_input.user_input }}"

- name: Add AZURE_STORAGE_CONNECTION_STRING to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_wizard_file }}"
    line: 'AZURE_STORAGE_CONNECTION_STRING="{{ dibbs_ecr_viewer_azure_storage_connection_string }}"'
    create: true
    mode: '0644'
  when: dibbs_ecr_viewer_azure_storage_connection_string | length > 0

- name: Read existing AZURE_CONTAINER_NAME from .env file
  ansible.builtin.shell: |
    source "{{ dibbs_ecr_viewer_env_file }}" 2>/dev/null || true
    echo "AZURE_CONTAINER_NAME=${AZURE_CONTAINER_NAME:-}"
  register: dibbs_ecr_viewer_existing_azure_container_name
  failed_when: false
  changed_when: false

- name: Prompt for AZURE_CONTAINER_NAME
  ansible.builtin.pause:
    prompt: |
      AZURE_CONTAINER_NAME (Current: {{ dibbs_ecr_viewer_existing_azure_container_name.stdout | default('') }}):
  register: dibbs_ecr_viewer_azure_container_name_input

- name: Set AZURE_CONTAINER_NAME fact
  ansible.builtin.set_fact:
    dibbs_ecr_viewer_azure_container_name: "{{ dibbs_ecr_viewer_azure_container_name_input.user_input }}"

- name: Add AZURE_CONTAINER_NAME to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_wizard_file }}"
    line: 'AZURE_CONTAINER_NAME="{{ dibbs_ecr_viewer_azure_container_name }}"'
    create: true
    mode: '0644'
  when: dibbs_ecr_viewer_azure_container_name | length > 0
