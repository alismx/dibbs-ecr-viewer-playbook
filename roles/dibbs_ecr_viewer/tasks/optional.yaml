---
# Optional Configuration Tasks

- name: Read existing SAVE_XML from .env file
  ansible.builtin.shell: |
    source "{{ dibbs_ecr_viewer_env_file }}" 2>/dev/null || true
    echo "SAVE_XML=${SAVE_XML:-}"
  register: dibbs_ecr_viewer_existing_save_xml
  failed_when: false
  changed_when: false

- name: Prompt for SAVE_XML (optional)
  ansible.builtin.pause:
    prompt: |
      SAVE_XML (Current: {{ dibbs_ecr_viewer_existing_save_xml.stdout | default('') }})
      (Optional: leave blank for defaults):
  register: dibbs_ecr_viewer_save_xml_input

- name: Set SAVE_XML fact
  ansible.builtin.set_fact:
    dibbs_ecr_viewer_save_xml: "{{ dibbs_ecr_viewer_save_xml_input.user_input }}"

- name: Add SAVE_XML to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_wizard_file }}"
    line: 'SAVE_XML="{{ dibbs_ecr_viewer_save_xml }}"'
    create: true
    mode: '0644'

- name: Read existing DISPLAY_FEEDBACK_LINKS from .env file
  ansible.builtin.shell: |
    source "{{ dibbs_ecr_viewer_env_file }}" 2>/dev/null || true
    echo "DISPLAY_FEEDBACK_LINKS=${DISPLAY_FEEDBACK_LINKS:-}"
  register: dibbs_ecr_viewer_existing_display_feedback_links
