---
# SQL Server Configuration Tasks

- name: Prompt for SQL_SERVER_USER
  ansible.builtin.pause:
    prompt: |
      SQL_SERVER_USER:
  register: sql_user_input

- name: Set SQL_SERVER_USER fact
  ansible.builtin.set_fact:
    SQL_SERVER_USER: "{{ sql_user_input.user_input }}"

- name: Add SQL_SERVER_USER to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_dir }}/docker/dibbs-ecr-viewer.wizard"
    line: 'SQL_SERVER_USER="{{ SQL_SERVER_USER }}"'
    create: true
    mode: '0644'

- name: Prompt for SQL_SERVER_PASSWORD
  ansible.builtin.pause:
    prompt: |
      SQL_SERVER_PASSWORD:
  register: sql_password_input

- name: Set SQL_SERVER_PASSWORD fact
  ansible.builtin.set_fact:
    SQL_SERVER_PASSWORD: "{{ sql_password_input.user_input }}"

- name: Add SQL_SERVER_PASSWORD to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_dir }}/docker/dibbs-ecr-viewer.wizard"
    line: 'SQL_SERVER_PASSWORD="{{ SQL_SERVER_PASSWORD }}"'
    create: true
    mode: '0644'

- name: Prompt for SQL_SERVER_HOST
  ansible.builtin.pause:
    prompt: |
      SQL_SERVER_HOST:
  register: sql_host_input

- name: Set SQL_SERVER_HOST fact
  ansible.builtin.set_fact:
    SQL_SERVER_HOST: "{{ sql_host_input.user_input }}"

- name: Add SQL_SERVER_HOST to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_dir }}/docker/dibbs-ecr-viewer.wizard"
    line: 'SQL_SERVER_HOST="{{ SQL_SERVER_HOST }}"'
    create: true
    mode: '0644'

- name: Prompt for DB_CIPHER
  ansible.builtin.pause:
    prompt: |
      DB_CIPHER:
  register: db_cipher_input

- name: Set DB_CIPHER fact
  ansible.builtin.set_fact:
    DB_CIPHER: "{{ db_cipher_input.user_input }}"

- name: Add DB_CIPHER to wizard file
