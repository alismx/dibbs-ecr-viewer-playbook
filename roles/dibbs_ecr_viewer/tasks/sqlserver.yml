- name: Prompt for METADATA_DATABASE_SCHEMA
  ansible.builtin.pause:
    prompt: |
      METADATA_DATABASE_SCHEMA (Schema options are: 'core' or 'extended'):
  register: metadata_schema_input

- name: Set METADATA_DATABASE_SCHEMA fact
  ansible.builtin.set_fact:
    METADATA_DATABASE_SCHEMA: "{{ metadata_schema_input.user_input }}"

- name: Add METADATA_DATABASE_SCHEMA to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_dir }}/docker/dibbs-ecr-viewer.wizard"
    line: 'METADATA_DATABASE_SCHEMA="{{ METADATA_DATABASE_SCHEMA }}"'
    create: true
    mode: '0644'

- name: Prompt for METADATA_DATABASE_MIGRATION_SECRET
  ansible.builtin.pause:
    prompt: |
      METADATA_DATABASE_MIGRATION_SECRET (Migration secret used to trigger migrations, one will be generated and output to ecr-viewer logs if you do not provide one):
  register: migration_secret_input

- name: Set METADATA_DATABASE_MIGRATION_SECRET fact
  ansible.builtin.set_fact:
    METADATA_DATABASE_MIGRATION_SECRET: "{{ migration_secret_input.user_input }}"

- name: Add METADATA_DATABASE_MIGRATION_SECRET to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_dir }}/docker/dibbs-ecr-viewer.wizard"
    line: 'METADATA_DATABASE_MIGRATION_SECRET="{{ METADATA_DATABASE_MIGRATION_SECRET }}"'
    create: true
    mode: '0644'
