- name: Prompt for METADATA_DATABASE_MIGRATION_SECRET
  ansible.builtin.pause:
    prompt: |
      METADATA_DATABASE_MIGRATION_SECRET (Migration secret used to trigger
      migrations; one will be generated and output to ecr-viewer logs if you
