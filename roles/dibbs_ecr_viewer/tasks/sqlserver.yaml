---
# SQL Server Configuration Tasks

- name: Read existing SQL_SERVER_USER from .env file
  ansible.builtin.shell: |
    . "{{ dibbs_ecr_viewer_env_file }}" 2>/dev/null || true
    echo "SQL_SERVER_USER=${SQL_SERVER_USER:-}"
  register: dibbs_ecr_viewer_existing_sql_server_user
  failed_when: false
  changed_when: false

- name: Prompt for SQL_SERVER_USER
  ansible.builtin.pause:
    prompt: |
      SQL_SERVER_USER (Current: {{ dibbs_ecr_viewer_existing_sql_server_user.stdout | default('') }}):
  register: dibbs_ecr_viewer_sql_server_user_input

- name: Add SQL_SERVER_USER to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_wizard_file }}"
    line: 'SQL_SERVER_USER="{{ dibbs_ecr_viewer_sql_server_user_input.user_input }}"'
    create: true
    mode: '0644'
  when: dibbs_ecr_viewer_sql_server_user_input.user_input | length > 0

