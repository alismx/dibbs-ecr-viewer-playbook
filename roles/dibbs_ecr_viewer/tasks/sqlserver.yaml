---
# SQL Server Configuration Tasks

- name: Prompt for SQL_SERVER_USER
  ansible.builtin.pause:
    prompt: |
      SQL_SERVER_USER:
  register: dibbs_ecr_viewer_sql_server_user_input

- name: Set SQL_SERVER_USER fact
  ansible.builtin.set_fact:
    dibbs_ecr_viewer_sql_server_user: "{{ dibbs_ecr_viewer_sql_server_user_input.user_input }}"

- name: Add SQL_SERVER_USER to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_wizard_file }}"
    line: 'SQL_SERVER_USER="{{ dibbs_ecr_viewer_sql_server_user }}"'
    create: true
    mode: '0644'

- name: Prompt for SQL_SERVER_PASSWORD
  ansible.builtin.pause:
    prompt: |
      SQL_SERVER_PASSWORD:
  register: dibbs_ecr_viewer_sql_server_password_input

- name: Set SQL_SERVER_PASSWORD fact
  ansible.builtin.set_fact:
