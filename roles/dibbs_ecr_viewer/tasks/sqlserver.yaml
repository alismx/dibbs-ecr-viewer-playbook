    dibbs_ecr_viewer_metadata_database_schema: "{{ dibbs_ecr_viewer_metadata_database_schema_input.user_input }}"

- name: Add METADATA_DATABASE_SCHEMA to wizard file
  ansible.builtin.lineinfile:
