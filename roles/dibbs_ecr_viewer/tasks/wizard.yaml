---
# Main wizard orchestration task

- name: Display wizard intro
  ansible.builtin.debug:
    msg: |
      **********************************************
      *   Welcome to the eCR Viewer setup wizard   *
      **********************************************

# CONFIG_NAME selection
- name: Read existing .env file to get current CONFIG_NAME
  ansible.builtin.shell: |
    . "{{ dibbs_ecr_viewer_env_file }}" 2>/dev/null || true
    echo "CONFIG_NAME=${CONFIG_NAME:-}"
  register: dibbs_ecr_viewer_env_config_name
  failed_when: false
  changed_when: false

- name: Prompt for CONFIG_NAME selection
  ansible.builtin.pause:
    prompt: |
      Current configuration: {{ dibbs_ecr_viewer_env_config_name.stdout | default('NONE SELECTED') }}

      Please select your CONFIG_NAME:

      1. AWS_PG_NON_INTEGRATED
      2. AWS_PG_DUAL
      3. AWS_SQLSERVER_NON_INTEGRATED
      4. AWS_SQLSERVER_DUAL
      5. AWS_INTEGRATED
      6. AZURE_PG_NON_INTEGRATED
      7. AZURE_PG_DUAL
      8. AZURE_SQLSERVER_NON_INTEGRATED
      9. AZURE_SQLSERVER_DUAL
      10. AZURE_INTEGRATED
      11. GCP_PG_NON_INTEGRATED
      12. GCP_PG_DUAL
      13. GCP_SQLSERVER_NON_INTEGRATED
      14. GCP_SQLSERVER_DUAL
      15. GCP_INTEGRATED

      "Enter the number of your configuration (1-15) or 'quit': "
  register: dibbs_ecr_viewer_config_selection

- name: Set CONFIG_NAME based on selection
  ansible.builtin.set_fact:
    dibbs_ecr_viewer_config_name: "{{ config_options[dibbs_ecr_viewer_config_selection.user_input | int - 1] }}"
  vars:
    config_options:
      - "AWS_PG_NON_INTEGRATED"
      - "AWS_PG_DUAL"
      - "AWS_SQLSERVER_NON_INTEGRATED"
      - "AWS_SQLSERVER_DUAL"
      - "AWS_INTEGRATED"
      - "AZURE_PG_NON_INTEGRATED"
      - "AZURE_PG_DUAL"
      - "AZURE_SQLSERVER_NON_INTEGRATED"
      - "AZURE_SQLSERVER_DUAL"
      - "AZURE_INTEGRATED"
      - "GCP_PG_NON_INTEGRATED"
      - "GCP_PG_DUAL"
      - "GCP_SQLSERVER_NON_INTEGRATED"
      - "GCP_SQLSERVER_DUAL"
      - "GCP_INTEGRATED"

- name: Handle quit selection
  ansible.builtin.fail:
    msg: "Wizard cancelled by user."
  when: "'quit' in dibbs_ecr_viewer_config_selection.user_input | lower"

# Add CONFIG_NAME to wizard file
- name: Add CONFIG_NAME to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_wizard_file }}"
    line: 'CONFIG_NAME="{{ dibbs_ecr_viewer_config_name }}"'
    create: true
    mode: '0644'

# Parse eCR Viewer defaults (ORCHESTRATION_URL)
- name: Parse eCR Viewer for default environment variables
  ansible.builtin.include_tasks: docker_compose_vars.yaml

# Cloud-specific tasks based on CONFIG_NAME
- name: Configure AWS settings
  ansible.builtin.include_tasks: aws.yaml
  when: "'AWS' in dibbs_ecr_viewer_config_name"

- name: Configure Azure settings
  ansible.builtin.include_tasks: azure.yaml
  when: "'AZURE' in dibbs_ecr_viewer_config_name"

- name: Configure GCP settings
  ansible.builtin.include_tasks: gcp.yaml
  when: "'GCP' in dibbs_ecr_viewer_config_name"

# Database-specific tasks based on CONFIG_NAME
- name: Configure PostgreSQL settings
  ansible.builtin.include_tasks: postgresql.yaml
  when: "'PG' in dibbs_ecr_viewer_config_name"

- name: Configure SQL Server settings
  ansible.builtin.include_tasks: sqlserver.yaml
  when: "'SQLSERVER' in dibbs_ecr_viewer_config_name"

- name: Configure other database settings
  ansible.builtin.include_tasks: db.yaml
  when: "'PG' in dibbs_ecr_viewer_config_name or 'SQLSERVER' in dibbs_ecr_viewer_config_name"

# NBS tasks (for DUAL or INTEGRATED modes)
- name: Configure NBS settings
  ansible.builtin.include_tasks: nbs.yaml
  when: "'_DUAL' in dibbs_ecr_viewer_config_name or '_INTEGRATED' in dibbs_ecr_viewer_config_name"

# Authentication tasks (run for NON_INTEGRATED and DUAL, not INTEGRATED)
- name: Configure authentication settings
  ansible.builtin.include_tasks: auth.yaml
  when: "'NON_INTEGRATED' in dibbs_ecr_viewer_config_name or '_DUAL' in dibbs_ecr_viewer_config_name"

# NextAuth tasks
- name: Configure NextAuth settings
  ansible.builtin.include_tasks: nextauth.yaml

# Optional settings
- name: Configure optional settings
  ansible.builtin.include_tasks: optional.yaml

# Final confirmation and file update
- name: Read wizard file contents
  ansible.builtin.slurp:
    src: "{{ dibbs_ecr_viewer_wizard_file }}"
  register: dibbs_ecr_viewer_wizard_content

- name: Prompt for configuration confirmation
  ansible.builtin.pause:
    prompt: |
      Please confirm the following settings (Double check for special characters that should be escaped):

      {{ dibbs_ecr_viewer_wizard_content.content | b64decode }}

      "Is this information correct? (y/n): "
  register: dibbs_ecr_viewer_confirm_input

- name: Fail if configuration not confirmed
  ansible.builtin.fail:
    msg: "Configuration cancelled. Please run the playbook again."
  when: "'n' in dibbs_ecr_viewer_confirm_input.user_input | lower or 'y' not in dibbs_ecr_viewer_confirm_input.user_input | lower"

- name: Backup existing .env file if it exists
  ansible.builtin.copy:
    src: "{{ dibbs_ecr_viewer_env_file }}"
    dest: "{{ dibbs_ecr_viewer_bak_file }}"
    remote_src: true
    mode: '0644'
  when: dibbs_ecr_viewer_backup_needed | default(false)

- name: Copy wizard file to .env file
  ansible.builtin.copy:
    src: "{{ dibbs_ecr_viewer_wizard_file }}"
    dest: "{{ dibbs_ecr_viewer_env_file }}"
    remote_src: true
    mode: '0644'
