---
# AWS Configuration Tasks

- name: Read existing AWS_REGION from .env file
  ansible.builtin.shell: |
    source "{{ dibbs_ecr_viewer_env_file }}" 2>/dev/null || true
    echo "AWS_REGION=${AWS_REGION:-}"
  register: dibbs_ecr_viewer_existing_aws_region
  failed_when: false
  changed_when: false

- name: Prompt for AWS_REGION
  ansible.builtin.pause:
    prompt: |
      AWS_REGION (Current Value: {{ dibbs_ecr_viewer_existing_aws_region.stdout | default('') }}) (e.g., us-east-1):
  register: dibbs_ecr_viewer_aws_region_input

- name: Set AWS_REGION fact
  ansible.builtin.set_fact:
    dibbs_ecr_viewer_aws_region: "{{ dibbs_ecr_viewer_aws_region_input.user_input }}"

- name: Add AWS_REGION to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_wizard_file }}"
    line: 'AWS_REGION="{{ dibbs_ecr_viewer_aws_region }}"'
    create: true
    mode: '0644'

- name: Read existing ECR_BUCKET_NAME from .env file
  ansible.builtin.shell: |
    source "{{ dibbs_ecr_viewer_env_file }}" 2>/dev/null || true
    echo "ECR_BUCKET_NAME=${ECR_BUCKET_NAME:-}"
  register: dibbs_ecr_viewer_existing_ecr_bucket_name
  failed_when: false
  changed_when: false

- name: Prompt for ECR_BUCKET_NAME
  ansible.builtin.pause:
    prompt: |
      ECR_BUCKET_NAME (Current Value: {{ dibbs_ecr_viewer_existing_ecr_bucket_name.stdout | default('') }}) (e.g., my-ecr-bucket):
  register: dibbs_ecr_viewer_ecr_bucket_name_input

- name: Set ECR_BUCKET_NAME fact
  ansible.builtin.set_fact:
    dibbs_ecr_viewer_ecr_bucket_name: "{{ dibbs_ecr_viewer_ecr_bucket_name_input.user_input }}"

- name: Add ECR_BUCKET_NAME to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_wizard_file }}"
    line: 'ECR_BUCKET_NAME="{{ dibbs_ecr_viewer_ecr_bucket_name }}"'
    create: true
    mode: '0644'
