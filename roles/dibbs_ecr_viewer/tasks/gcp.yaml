---
# GCP Configuration Tasks

- name: Install google-guest-agent for GCP
  ansible.builtin.package:
    name: google-guest-agent
    state: present
  become: true

- name: Read existing GCP_PROJECT_ID from .env file
  ansible.builtin.shell: |
    . "{{ dibbs_ecr_viewer_env_file }}" 2>/dev/null || true
    echo "GCP_PROJECT_ID=${GCP_PROJECT_ID:-}"
  register: dibbs_ecr_viewer_existing_gcp_project_id
  failed_when: false
  changed_when: false

- name: Prompt for GCP_PROJECT_ID
  ansible.builtin.pause:
    prompt: |
      GCP_PROJECT_ID (Current: {{ dibbs_ecr_viewer_existing_gcp_project_id.stdout | default('') }}):
  register: dibbs_ecr_viewer_gcp_project_id_input

- name: Add GCP_PROJECT_ID to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_wizard_file }}"
    line: 'GCP_PROJECT_ID="{{ dibbs_ecr_viewer_gcp_project_id_input.user_input }}"'
    create: true
    mode: '0644'
  when: dibbs_ecr_viewer_gcp_project_id_input.user_input | length > 0

- name: Read existing ECR_BUCKET_NAME from .env file
  ansible.builtin.shell: |
    . "{{ dibbs_ecr_viewer_env_file }}" 2>/dev/null || true
    echo "ECR_BUCKET_NAME=${ECR_BUCKET_NAME:-}"
  register: dibbs_ecr_viewer_existing_ecr_bucket_name
  failed_when: false
  changed_when: false

- name: Prompt for ECR_BUCKET_NAME
  ansible.builtin.pause:
    prompt: |
      ECR_BUCKET_NAME (Current: {{ dibbs_ecr_viewer_existing_ecr_bucket_name.stdout | default('') }}) (e.g., my-ecr-bucket):
  register: dibbs_ecr_viewer_ecr_bucket_name_input

- name: Add ECR_BUCKET_NAME to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_wizard_file }}"
    line: 'ECR_BUCKET_NAME="{{ dibbs_ecr_viewer_ecr_bucket_name_input.user_input }}"'
    create: true
    mode: '0644'
  when: dibbs_ecr_viewer_ecr_bucket_name_input.user_input | length > 0
