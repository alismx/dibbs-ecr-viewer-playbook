---
# GCP Configuration Tasks

- name: Prompt for GCP_PROJECT_ID
  ansible.builtin.pause:
    prompt: |
      GCP_PROJECT_ID:
  register: dibbs_ecr_viewer_gcp_project_id_input

- name: Set GCP_PROJECT_ID fact
  ansible.builtin.set_fact:
    dibbs_ecr_viewer_gcp_project_id: "{{ dibbs_ecr_viewer_gcp_project_id_input.user_input }}"

- name: Add GCP_PROJECT_ID to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_wizard_file }}"
    line: 'GCP_PROJECT_ID="{{ dibbs_ecr_viewer_gcp_project_id }}"'
    create: true
    mode: '0644'

- name: Prompt for ECR_BUCKET_NAME
  ansible.builtin.pause:
    prompt: |
      ECR_BUCKET_NAME (e.g., my-ecr-bucket):
  register: dibbs_ecr_viewer_ecr_bucket_name_input

- name: Set ECR_BUCKET_NAME fact
  ansible.builtin.set_fact:
    dibbs_ecr_viewer_ecr_bucket_name: "{{ dibbs_ecr_viewer_ecr_bucket_name_input.user_input }}"

- name: Add ECR_BUCKET_NAME to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_wizard_file }}"
    line: 'ECR_BUCKET_NAME="{{ dibbs_ecr_viewer_ecr_bucket_name }}"'
    create: true
    mode: '0644'
