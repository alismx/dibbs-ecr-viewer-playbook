---
# Docker Compose variables configuration

- name: Get latest release info from GitHub API
  ansible.builtin.uri:
    url: "{{ dibbs_ecr_viewer_release_url }}"
    return_content: true
  register: dibbs_ecr_viewer_github_release
  failed_when: false
  changed_when: false

- name: Extract release URL
  ansible.builtin.set_fact:
    dibbs_ecr_viewer_release_info: "{{ (dibbs_ecr_viewer_github_release.content | from_json).html_url | default('') }}"

- name: Display latest release info
  ansible.builtin.debug:
    msg: "Latest release information: {{ dibbs_ecr_viewer_release_info }}"
  when: dibbs_ecr_viewer_release_info | length > 0

# ORCHESTRATION_URL - set to default value
- name: Set ORCHESTRATION_URL
  ansible.builtin.set_fact:
    dibbs_ecr_viewer_orchestration_url: "http://dibbs-orchestration:8080"

- name: Add ORCHESTRATION_URL to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_wizard_file }}"
    line: 'ORCHESTRATION_URL="http://dibbs-orchestration:8080"'
    create: true
    mode: '0644'

# DIBBS_VERSION - read Current from .env file if it exists
- name: Read existing DIBBS_VERSION from .env file
  ansible.builtin.shell: |
    source "{{ dibbs_ecr_viewer_env_file }}" 2>/dev/null || true
    echo "DIBBS_VERSION=${DIBBS_VERSION:-}"
  register: dibbs_ecr_viewer_existing_dibbs_version
  failed_when: false
  changed_when: false

- name: Prompt for DIBBS_VERSION
  ansible.builtin.pause:
    prompt: |
      DIBBS_VERSION (Current: {{ dibbs_ecr_viewer_existing_dibbs_version.stdout | default('') }}):
  register: dibbs_ecr_viewer_dibbs_version_input

- name: Set DIBBS_VERSION fact from input
  ansible.builtin.set_fact:
    dibbs_ecr_viewer_dibbs_version: "{{ dibbs_ecr_viewer_dibbs_version_input.user_input }}"

- name: Add DIBBS_VERSION to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_wizard_file }}"
    line: 'DIBBS_VERSION="{{ dibbs_ecr_viewer_dibbs_version }}"'
    create: true
    mode: '0644'
  when: dibbs_ecr_viewer_dibbs_version | length > 0
