---
# Database Configuration Tasks

- name: Read existing METADATA_DATABASE_SCHEMA from .env file
  ansible.builtin.shell: |
    . "{{ dibbs_ecr_viewer_env_file }}" 2>/dev/null || true
    echo "METADATA_DATABASE_SCHEMA=${METADATA_DATABASE_SCHEMA:-}"
  register: dibbs_ecr_viewer_existing_metadata_database_schema
  failed_when: false
  changed_when: false

- name: Prompt for METADATA_DATABASE_SCHEMA
  ansible.builtin.pause:
    prompt: |
      METADATA_DATABASE_SCHEMA (Current: {{ dibbs_ecr_viewer_existing_metadata_database_schema.stdout | default('') }}) ('core' or 'extended'):
  register: dibbs_ecr_viewer_metadata_database_schema_input

- name: Set METADATA_DATABASE_SCHEMA fact
  ansible.builtin.set_fact:
    dibbs_ecr_viewer_metadata_database_schema: "{{ dibbs_ecr_viewer_metadata_database_schema_input.user_input }}"

- name: Add METADATA_DATABASE_SCHEMA to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_wizard_file }}"
    line: 'METADATA_DATABASE_SCHEMA="{{ dibbs_ecr_viewer_metadata_database_schema }}"'
    create: true
    mode: '0644'
  when: dibbs_ecr_viewer_metadata_database_schema | length > 0

- name: Read existing METADATA_DATABASE_MIGRATION_SECRET from .env file
  ansible.builtin.shell: |
    . "{{ dibbs_ecr_viewer_env_file }}" 2>/dev/null || true
    echo "METADATA_DATABASE_MIGRATION_SECRET=${METADATA_DATABASE_MIGRATION_SECRET:-}"
  register: dibbs_ecr_viewer_existing_metadata_database_migration_secret
  failed_when: false
  changed_when: false

- name: Prompt for METADATA_DATABASE_MIGRATION_SECRET
  ansible.builtin.pause:
    prompt: |
      METADATA_DATABASE_MIGRATION_SECRET (Current: {{ dibbs_ecr_viewer_existing_metadata_database_migration_secret.stdout | default('') }})
      (generated if not provided):
  register: dibbs_ecr_viewer_metadata_database_migration_secret_input

- name: Set METADATA_DATABASE_MIGRATION_SECRET fact
  ansible.builtin.set_fact:
    dibbs_ecr_viewer_metadata_database_migration_secret: "{{ dibbs_ecr_viewer_metadata_database_migration_secret_input.user_input }}"

- name: Add METADATA_DATABASE_MIGRATION_SECRET to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_wizard_file }}"
    line: 'METADATA_DATABASE_MIGRATION_SECRET="{{ dibbs_ecr_viewer_metadata_database_migration_secret }}"'
    create: true
    mode: '0644'
  when: dibbs_ecr_viewer_metadata_database_migration_secret | length > 0
