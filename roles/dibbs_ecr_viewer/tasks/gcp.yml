---
# GCP Configuration Tasks

- name: Prompt for GCP_PROJECT_ID
  ansible.builtin.pause:
    prompt: |
      GCP_PROJECT_ID:
  register: gcp_project_input

- name: Set GCP_PROJECT_ID fact
  ansible.builtin.set_fact:
    GCP_PROJECT_ID: "{{ gcp_project_input.user_input }}"

- name: Add GCP_PROJECT_ID to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_dir }}/docker/dibbs-ecr-viewer.wizard"
    line: 'GCP_PROJECT_ID="{{ GCP_PROJECT_ID }}"'
    create: true
    mode: '0644'

- name: Prompt for ECR_BUCKET_NAME
  ansible.builtin.pause:
    prompt: |
      ECR_BUCKET_NAME (e.g., my-ecr-bucket):
  register: ecr_bucket_input

- name: Set ECR_BUCKET_NAME fact
  ansible.builtin.set_fact:
    ECR_BUCKET_NAME: "{{ ecr_bucket_input.user_input }}"

- name: Add ECR_BUCKET_NAME to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_dir }}/docker/dibbs-ecr-viewer.wizard"
    line: 'ECR_BUCKET_NAME="{{ ECR_BUCKET_NAME }}"'
    create: true
    mode: '0644'
