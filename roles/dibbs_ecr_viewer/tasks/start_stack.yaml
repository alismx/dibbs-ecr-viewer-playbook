---
# Start Docker Compose stack

# Validate that required facts are set before starting compose
- name: Validate required configuration facts
  ansible.builtin.assert:
    that:
      - DIBBS_VERSION is defined and DIBBS_VERSION | length > 0
      - CONFIG_NAME is defined and CONFIG_NAME | length > 0
    fail_msg: |
      Configuration incomplete. Required variables are not set.

      Please run the playbook with force_wizard to configure:

        ansible-playbook -c local playbook.yaml --extra-var "force_wizard=true"

      This will prompt you for all configuration settings.
    success_msg: "Configuration validated successfully."

- name: Up ecr-viewer compose
  ansible.builtin.command:
    cmd: docker compose up -d
  args:
    chdir: "{{ dibbs_playbook_dir }}/docker/"
  environment:
    CONFIG_NAME: "{{ CONFIG_NAME | default('') }}"
    ORCHESTRATION_URL: "{{ ORCHESTRATION_URL | default('http://dibbs-orchestration:8080') }}"
    DIBBS_VERSION: "{{ DIBBS_VERSION | default('') }}"
    DATABASE_URL: "{{ DATABASE_URL | default('') }}"
    METADATA_DATABASE_SCHEMA: "{{ METADATA_DATABASE_SCHEMA | default('') }}"
    METADATA_DATABASE_MIGRATION_SECRET: "{{ METADATA_DATABASE_MIGRATION_SECRET | default('') }}"
    SQL_SERVER_USER: "{{ SQL_SERVER_USER | default('') }}"
    SQL_SERVER_PASSWORD: "{{ SQL_SERVER_PASSWORD | default('') }}"
    SQL_SERVER_HOST: "{{ SQL_SERVER_HOST | default('') }}"
    DB_CIPHER: "{{ DB_CIPHER | default('') }}"
    NBS_API_PUB_KEY: "{{ NBS_API_PUB_KEY | default('') }}"
    NBS_PUB_KEY: "{{ NBS_PUB_KEY | default('') }}"
    AUTH_PROVIDER: "{{ AUTH_PROVIDER | default('') }}"
    AUTH_CLIENT_ID: "{{ AUTH_CLIENT_ID | default('') }}"
    AUTH_CLIENT_SECRET: "{{ AUTH_CLIENT_SECRET | default('') }}"
    AUTH_ISSUER: "{{ AUTH_ISSUER | default('') }}"
    AUTH_SESSION_DURATION_MIN: "{{ AUTH_SESSION_DURATION_MIN | default('') }}"
    NEXTAUTH_URL: "{{ NEXTAUTH_URL | default('') }}"
    NEXTAUTH_SECRET: "{{ NEXTAUTH_SECRET | default('') }}"
    SAVE_XML: "{{ SAVE_XML | default('') }}"
    DISPLAY_FEEDBACK_LINKS: "{{ DISPLAY_FEEDBACK_LINKS | default('') }}"
    ECR_PROCESSING_TIMEOUT: "{{ ECR_PROCESSING_TIMEOUT | default('') }}"
    AWS_REGION: "{{ AWS_REGION | default('') }}"
    AZURE_STORAGE_CONNECTION_STRING: "{{ AZURE_STORAGE_CONNECTION_STRING | default('') }}"
    AZURE_CONTAINER_NAME: "{{ AZURE_CONTAINER_NAME | default('') }}"
    GCP_PROJECT_ID: "{{ GCP_PROJECT_ID | default('') }}"
    ECR_BUCKET_NAME: "{{ ECR_BUCKET_NAME | default('') }}"
