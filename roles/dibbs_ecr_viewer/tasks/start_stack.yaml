# Validate that required facts are set before starting compose
- name: Validate required configuration facts
  ansible.builtin.assert:
    that:
      - dibbs_ecr_viewer_dibbs_version is defined and dibbs_ecr_viewer_dibbs_version | length > 0
      - dibbs_ecr_viewer_config_name is defined and dibbs_ecr_viewer_config_name | length > 0
    fail_msg: |
      Configuration incomplete. Required variables are not set.

      Please run the playbook with force_wizard to configure:

        ansible-playbook -c local playbook.yaml --extra-var "force_wizard=true"

      This will prompt you for all configuration settings.
    success_msg: "Configuration validated successfully."

- name: Start Docker Compose stack
  ansible.builtin.command:
    cmd: docker compose up -d
  args:
    chdir: "{{ dibbs_ecr_viewer_docker_dir }}"
  changed_when: true
  environment:
    CONFIG_NAME: "{{ dibbs_ecr_viewer_config_name | default('') }}"
    ORCHESTRATION_URL: "{{ dibbs_ecr_viewer_orchestration_url | default('http://dibbs-orchestration:8080') }}"
    DIBBS_VERSION: "{{ dibbs_ecr_viewer_dibbs_version | default('') }}"
    DATABASE_URL: "{{ dibbs_ecr_viewer_database_url | default('') }}"
    METADATA_DATABASE_SCHEMA: "{{ dibbs_ecr_viewer_metadata_database_schema | default('') }}"
    METADATA_DATABASE_MIGRATION_SECRET: "{{ dibbs_ecr_viewer_metadata_database_migration_secret | default('') }}"
    SQL_SERVER_USER: "{{ dibbs_ecr_viewer_sql_server_user | default('') }}"
    SQL_SERVER_PASSWORD: "{{ dibbs_ecr_viewer_sql_server_password | default('') }}"
    SQL_SERVER_HOST: "{{ dibbs_ecr_viewer_sql_server_host | default('') }}"
    DB_CIPHER: "{{ dibbs_ecr_viewer_db_cipher | default('') }}"
    NBS_API_PUB_KEY: "{{ dibbs_ecr_viewer_nbs_api_pub_key | default('') }}"
    NBS_PUB_KEY: "{{ dibbs_ecr_viewer_nbs_pub_key | default('') }}"
    AUTH_PROVIDER: "{{ dibbs_ecr_viewer_auth_provider | default('') }}"
    AUTH_CLIENT_ID: "{{ dibbs_ecr_viewer_auth_client_id | default('') }}"
    AUTH_CLIENT_SECRET: "{{ dibbs_ecr_viewer_auth_client_secret | default('') }}"
    AUTH_ISSUER: "{{ dibbs_ecr_viewer_auth_issuer | default('') }}"
    AUTH_SESSION_DURATION_MIN: "{{ dibbs_ecr_viewer_auth_session_duration_min | default('') }}"
    NEXTAUTH_URL: "{{ dibbs_ecr_viewer_nextauth_url | default('') }}"
    NEXTAUTH_SECRET: "{{ dibbs_ecr_viewer_nextauth_secret | default('') }}"
    SAVE_XML: "{{ dibbs_ecr_viewer_save_xml | default('') }}"
    DISPLAY_FEEDBACK_LINKS: "{{ dibbs_ecr_viewer_display_feedback_links | default('') }}"
    ECR_PROCESSING_TIMEOUT: "{{ dibbs_ecr_viewer_ecr_processing_timeout | default('') }}"
    AWS_REGION: "{{ dibbs_ecr_viewer_aws_region | default('') }}"
    AZURE_STORAGE_CONNECTION_STRING: "{{ dibbs_ecr_viewer_azure_storage_connection_string | default('') }}"
    AZURE_CONTAINER_NAME: "{{ dibbs_ecr_viewer_azure_container_name | default('') }}"
    GCP_PROJECT_ID: "{{ dibbs_ecr_viewer_gcp_project_id | default('') }}"
    ECR_BUCKET_NAME: "{{ dibbs_ecr_viewer_ecr_bucket_name | default('') }}"
