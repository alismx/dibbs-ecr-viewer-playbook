---
# NextAuth Configuration Tasks

- name: Read existing NEXTAUTH_SECRET from .env file
  ansible.builtin.shell: |
    source "{{ dibbs_ecr_viewer_env_file }}" 2>/dev/null || true
    echo "NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}"
  register: dibbs_ecr_viewer_existing_nextauth_secret
  failed_when: false
  changed_when: false

- name: Prompt for NEXTAUTH_SECRET
  ansible.builtin.pause:
    prompt: |
      NEXTAUTH_SECRET (Current: {{ dibbs_ecr_viewer_existing_nextauth_secret.stdout | default('') }}) (use: openssl rand -base64 32):
  register: dibbs_ecr_viewer_nextauth_secret_input

- name: Set NEXTAUTH_SECRET fact
  ansible.builtin.set_fact:
    dibbs_ecr_viewer_nextauth_secret: "{{ dibbs_ecr_viewer_nextauth_secret_input.user_input }}"

- name: Add NEXTAUTH_SECRET to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_wizard_file }}"
    line: 'NEXTAUTH_SECRET="{{ dibbs_ecr_viewer_nextauth_secret }}"'
    create: true
    mode: '0644'
