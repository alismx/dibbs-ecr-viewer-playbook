---
# Authentication Configuration Tasks

- name: Read existing AUTH_PROVIDER from .env file
  ansible.builtin.shell: |
    . "{{ dibbs_ecr_viewer_env_file }}" 2>/dev/null || true
    echo "AUTH_PROVIDER=${AUTH_PROVIDER:-}"
  register: dibbs_ecr_viewer_existing_auth_provider
  failed_when: false
  changed_when: false

- name: Prompt for AUTH_PROVIDER
  ansible.builtin.pause:
    prompt: |
      AUTH_PROVIDER (Current: {{ dibbs_ecr_viewer_existing_auth_provider.stdout | default('') }}) (Valid options are 'ad' or 'keycloak'):
  register: dibbs_ecr_viewer_auth_provider_input

- name: Add AUTH_PROVIDER to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_wizard_file }}"
    line: 'AUTH_PROVIDER="{{ dibbs_ecr_viewer_auth_provider_input.user_input }}"'
    create: true
    mode: '0644'
  when: dibbs_ecr_viewer_auth_provider_input.user_input | length > 0

- name: Read existing AUTH_CLIENT_ID from .env file
  ansible.builtin.shell: |
