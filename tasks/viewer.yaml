---

# Check if wizard has been run (DIBBS_VERSION and DIBBS_SERVICE should be defined)
- name: Check for required environment variables
  ansible.builtin.shell: |
    source "{{ dibbs_ecr_viewer_dir }}/docker/dibbs-ecr-viewer.env"
    echo "DIBBS_VERSION=$DIBBS_VERSION"
    echo "DIBBS_SERVICE=$DIBBS_SERVICE"
  register: env_check
  failed_when: false
  changed_when: false

- name: Fail if wizard not run
  ansible.builtin.fail:
    msg: |
      Configuration incomplete. Please run the setup wizard first:

        cd ~/dibbs-ecr-viewer-playbook && ./wizard.sh

      This will configure your environment and generate the required .env file.
  when: '"DIBBS_VERSION=" not in env_check.stdout or "DIBBS_SERVICE=" not in env_check.stdout'

- name: Up ecr-viewer compose
  ansible.builtin.command:
    cmd: docker compose up -d
  args:
    chdir: "{{ dibbs_ecr_viewer_dir }}/docker/"
  environment:
    # - CONFIG_NAME: "{{ CONFIG_NAME }}"
    # - DIBBS_SERVICE: "{{ DIBBS_SERVICE }}"
    # - ORCHESTRATION_URL: "{{ ORCHESTRATION_URL }}"
