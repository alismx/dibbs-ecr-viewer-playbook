---
# AWS Configuration Tasks

- name: Prompt for AWS_REGION
  ansible.builtin.pause:
    prompt: |
      AWS_REGION (e.g., us-east-1):
  register: aws_region_input

- name: Set AWS_REGION fact
  ansible.builtin.set_fact:
    AWS_REGION: "{{ aws_region_input.user_input }}"

- name: Add AWS_REGION to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_dir }}/docker/dibbs-ecr-viewer.wizard"
    line: 'AWS_REGION="{{ AWS_REGION }}"'
    create: true
    mode: '0644'

- name: Prompt for ECR_BUCKET_NAME
  ansible.builtin.pause:
    prompt: |
      ECR_BUCKET_NAME (e.g., my-ecr-bucket):
  register: ecr_bucket_input

- name: Set ECR_BUCKET_NAME fact
  ansible.builtin.set_fact:
    ECR_BUCKET_NAME: "{{ ecr_bucket_input.user_input }}"

- name: Add ECR_BUCKET_NAME to wizard file
  ansible.builtin.lineinfile:
    path: "{{ dibbs_ecr_viewer_dir }}/docker/dibbs-ecr-viewer.wizard"
    line: 'ECR_BUCKET_NAME="{{ ECR_BUCKET_NAME }}"'
    create: true
    mode: '0644'
